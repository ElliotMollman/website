<style>
      .top_header {
      position: fixed;
      background: white;
      border-style: solid;
      border-color: white white grey white;
      top: 0px;
      height: 60px;
      display: flex;
      width: 100%;
      z-index: 999;
      margin-right: 0;
      margin-left: 0;
      }

      .top_left_bar {
      float: left;
      display: flex;
      align-items: center;
      width: 200px;
      font-weight: bold;
      font-size: 18px;
      background: bisque;
      height: 100%;


      }

      .top_right_bar {
      background: bisque;
      display: flex;
      align-items: center;
      float: right;
      width: 500px;
      margin-right: 0;
      z-index: 500;
      overflow: hidden;
      }


      .top_right_link {
      text-decoration: none;
      margin-left: 10px;
      margin-right: 10px;
      color: #000000;
      font-size: 20px;
      }

      .home_button {
      text-decoration: none;
      margin-left: 10px;
      margin-right: 10px;
      color: black;
      font-size: 30px;
      }

      .dropdown .dropdown_button {
      border: none;
      outline: none;
      background-color: inherit;
      font-family: inherit;
      margin: 0;
      font-size: 22px;
      color: #000000;
      font-weight: bold;
      }

      .dropdown-content {
      display: none;
      position: absolute;
      background-color: white;
      min-width: 160px;
      box-shadow: 0px 8px 16px 0px rgba(0,0,0,0.2);
      z-index: 1;
      }

      .dropdown:hover .dropdown-content {
      display: block;
      }


      .float_child_left {
      width: 50%;
      float: left;
      padding: 20px;
      display: flex;
      }

      .float_child_right {
      width: 50%;
      float: right;
      padding: 20px;
      display: flex;
      }

      .white_page_break {
      background: white;
      height: 70px;
      width: 100%;
      }

      .blog_picture {
      float: left;
      height: 100%;
      width: 20%;
      }

</style>
